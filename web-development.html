<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Web Development</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<canvas id="bgCanvas"></canvas>

<header id="navbar">
  <div class="logo">Rajlux<span>Company</span></div>
  <div id="menuToggle">☰</div>
  <nav id="navMenu">
    <a href="index.html" class="nav-link">Home</a>
    <button id="themeToggle">🌙</button>
  </nav>
</header>

<section class="section reveal">
<h2>Web Development Projects</h2>
<div class="cards">

<div class="card project-card">
<img src="1000038140.jpg" alt="Ecommerce Project">
<h3>E-Commerce Website</h3>
<p>Online shopping platform with payment gateway.</p>
<button class="view-btn" onclick="openProject('1000038140.jpg')">View Project</button>
</div>

<div class="card project-card">
<img src="1000038138.jpg" alt="School System">
<h3>School Management System</h3>
<p>Student records and attendance system.</p>
<button class="view-btn" onclick="openProject('1000038138.jpg')">View Project</button>
</div>

<div class="card project-card">
<img src="1000038139.jpg" alt="Company Website">
<h3>Company Portfolio</h3>
<p>Professional business website design.</p>
<button class="view-btn" onclick="openProject('1000038139.jpg')">View Project</button>
</div>

</div>
</section>

<footer>
<a href="index.html">⬅ Back to Home</a>
</footer>

<!-- PROJECT MODAL -->
<div id="projectModal" class="modal">
<div class="modal-content">
<span class="close">&times;</span>
<img id="modalImg">

</div>
</div>

<script src="script.js"></script>
<script>
function openProject(src){
  const modal = document.getElementById("projectModal");
  const modalImg = document.getElementById("modalImg");
  modal.style.display = "flex";
  modalImg.src = src;
}
const modalClose = document.querySelector(".close");
if(modalClose){
  modalClose.onclick = () => { document.getElementById("projectModal").style.display="none"; }
}
</script>
</body>

</html>
