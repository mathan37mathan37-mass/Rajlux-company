<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digital Marketing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<canvas id="bgCanvas"></canvas>

<header id="navbar">
<div class="logo">Rajlux<span>Company</span></div>
<div id="menuToggle">☰</div>
<nav id="navMenu">
<a href="index.html" class="nav-link">Home</a>
<button id="themeToggle">🌙</button>
</nav>
</header>

<section class="section reveal">
<h2>Digital Marketing Campaigns</h2>
<div class="cards">

<div class="card project-card">
<img src="1000038141.jpg" alt="SEO Optimization">
<h3>SEO Optimization</h3>
<p>Improved Google ranking for company websites.</p>
<button class="view-btn" onclick="openProject('1000038141.jpg')">View Campaign</button>
</div>

<div class="card project-card">
<img src="1000038139.jpg" alt="Social Media Campaign">
<h3>Social Media Campaign</h3>
<p>Instagram and Facebook brand promotion.</p>
<button class="view-btn" onclick="openProject('1000038139.jpg')">View Campaign</button>
</div>

<div class="card project-card">
<img src="1000038138.jpg" alt="Google Ads Campaign">
<h3>Google Ads Campaign</h3>

<button class="view-btn" onclick="openProject('1000038138.jpg')">View Campaign</button>
</div>

</div>
</section>

<footer>
<a href="index.html">⬅ Back to Home</a>
</footer>

<!-- PROJECT MODAL -->
<div id="projectModal" class="modal">
<div class="modal-content">
<span class="close">&times;</span>
<img id="modalImg">
</div>
</div>

<script src="script.js"></script>
<script>
function openProject(src){
  const modal = document.getElementById("projectModal");
  const modalImg = document.getElementById("modalImg");
  modal.style.display = "flex";
  modalImg.src = src;
}
const modalClose = document.querySelector(".close");
if(modalClose){
  modalClose.onclick = () => { document.getElementById("projectModal").style.display="none"; }
}
</script>
</body>

</html>
