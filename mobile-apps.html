<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mobile App Projects</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<canvas id="bgCanvas"></canvas>

<header id="navbar">
<div class="logo">Rajlux<span>Company</span></div>
<div id="menuToggle">☰</div>
<nav id="navMenu">
<a href="index.html" class="nav-link">Home</a>
<button id="themeToggle">🌙</button>
</nav>
</header>

<section class="section reveal">
<h2>Mobile Applications</h2>
<div class="cards">

<div class="card project-card">
<img src="https://picsum.photos/300/200?random=4" alt="Food Delivery App">
<h3>Food Delivery App</h3>
<p>Android app for ordering food online.</p>
<button class="view-btn" onclick="openProject('https://picsum.photos/600/400?random=4')">View Project</button>
</div>

<div class="card project-card">
<img src="https://picsum.photos/300/200?random=5" alt="Online Voting App">
<h3>Online Voting App</h3>
<p>Secure digital voting application.</p>
<button class="view-btn" onclick="openProject('https://picsum.photos/600/400?random=5')">View Project</button>
</div>

<div class="card project-card">
<img src="https://picsum.photos/300/200?random=6" alt="Fitness Tracker">
<h3>Fitness Tracker</h3>
<p>Mobile app for tracking workouts and health.</p>
<button class="view-btn" onclick="openProject('https://picsum.photos/600/400?random=6')">View Project</button>
</div>

</div>
</section>

<footer>
<a href="index.html">⬅ Back to Home</a>
</footer>

<!-- PROJECT MODAL -->
<div id="projectModal" class="modal">
<div class="modal-content">
<span class="close">&times;</span>
<img id="modalImg">
</div>
</div>

<script src="script.js"></script>
<script>
function openProject(src){
  const modal = document.getElementById("projectModal");
  const modalImg = document.getElementById("modalImg");
  modal.style.display = "flex";
  modalImg.src = src;
}
const modalClose = document.querySelector(".close");
if(modalClose){
  modalClose.onclick = () => { document.getElementById("projectModal").style.display="none"; }
}
</script>
</body>
</html>
